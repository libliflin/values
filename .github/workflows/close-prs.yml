name: Close incoming PRs

# This repo is a manifesto, not a codebase accepting contributions.
# All discussion lives in issues. PRs are auto-closed with a pointer
# to the issues tracker.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const message = [
              "Thanks for the interest, but this repo is a manifesto, not a codebase accepting contributions.",
              "",
              "All discussion and disagreement lives in the [issues tracker](https://github.com/libliflin/values/issues). Please open an issue describing:",
              "",
              "- where the manifesto is wrong,",
              "- which objection it failed to preempt, or",
              "- which part bounced you off.",
              "",
              "I'd rather read it as an issue than merge it as a PR."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed"
            });
